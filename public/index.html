<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>asyoutype</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <form id="join">
        <h1>asyoutype</h1>
        <div class="modes">
          <label><input type="radio" name="mode" value="create" checked />
            create</label>
          <label><input type="radio" name="mode" value="join" /> join</label>
        </div>
        <input
          type="text"
          name="name"
          placeholder="room name (4-10 chars)"
          required
        />
        <input type="number" name="capacity" value="4" min="1" max="8" />
        <button type="submit">enter</button>
        <div class="error" id="error"></div>
      </form>

      <section id="room" hidden></section>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
